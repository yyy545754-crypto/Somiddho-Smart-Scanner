
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Somiddho - Smart Scanner</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f43f5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Somiddho">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3126/3126504.png">

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#0df259',
            secondary: '#f43f5e',
            background: {
              dark: '#1a0209',
              card: '#2d030f'
            }
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #0df259;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #1a0209; 
      color: #ffffff;
      overflow-x: hidden;
      font-size: 17px; /* Slightly larger base font */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .glass-panel {
      background: rgba(45, 3, 15, 0.7); 
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    h1, h2, h3, h4 {
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .text-primary {
      color: var(--primary-color) !important;
    }
    .hud-corner {
      width: 24px;
      height: 24px;
      border-color: var(--primary-color);
      position: absolute;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @media print {
      nav, header button, footer, .no-print {
        display: none !important;
      }
      body {
        background: white !important;
        color: black !important;
      }
      #root {
        padding: 0 !important;
        margin: 0 !important;
      }
      .glass-panel {
        background: transparent !important;
        border: 1px solid #ddd !important;
        color: black !important;
        box-shadow: none !important;
        border-radius: 12px !important;
      }
      .text-white, .text-white\/30, .text-white\/40, .text-white\/50 {
        color: black !important;
      }
      .bg-primary {
        background-color: #0df259 !important;
        -webkit-print-color-adjust: exact;
      }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "jsqr": "https://esm.sh/jsqr@^1.4.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
<body class="bg-background-dark text-white font-display">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
